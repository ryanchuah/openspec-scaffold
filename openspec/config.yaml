schema: spec-driven

context: |
  Project: <FILL: project name>
  Purpose: <FILL: one or two sentences describing what this project does>
  Tech stack: <FILL: language/runtime, database, key libraries>
  Testing: <FILL: test framework and philosophy, e.g. "pytest; prefer property/invariant tests over output-pinning tests; 'tests pass' + 'the system ran clean' are the only live-status signals — never record test/doc/row counts in any tracked doc, even as history; only a failing/skipped test is worth a note">
  Style: no inline comments unless the WHY is non-obvious; no docstrings unless public API.
  Web research: always use scripts/fetch_clean.py for article/doc content; WebFetch only for single-fact extraction (full convention: rules.research in this file).

rules:
  # CANONICAL: tasks-md-apply-only — cite, do not restate
  tasks:
    - >-
      When apply is triggered, do not implement in the primary session. Delegate to
      the apply-executor: under Claude, drive the deepseek-v4-flash apply-executor via
      `opencode run` (Sonnet subagent only as fallback per the apply-skill ladder); under
      OpenCode, delegate to @apply-executor / DeepSeek Flash. Pass the paths to
      proposal.md, design.md, tasks.md. The executor works tasks.md sequentially and
      checks off each task.
    - >-
      tasks.md contains ONLY apply-phase implementation work — deterministic code, tests,
      and scripts the executor completes sequentially and checks off. Verify (live-canary
      eyeball / behavioral acceptance) and archive (spec sync, doc reconciliation, notes.md
      write) are NOT executor work and MUST NOT appear as tasks.md checkboxes — they need
      live LLM calls, human judgment, or a separate delegated pass, and listing them
      produces a false "incomplete / in-progress" status at archive. Change-specific
      acceptance criteria belong in a "Verification" section of design.md (authored and
      reviewed at propose); the generic verify procedure lives in the verify skill; verify
      results go in notes.md.
  verify:
    - >-
      Verify is the orchestrator's own substantive behavioral review of the
      apply-executor's work (not a checklist rubber-stamp). The primary agent
      itself (never delegated, never trusting the executor's summary) MUST - (1) read the
      actual diffs/changed files (git diff); (2) re-run the FULL test suite
      (prefer `scripts/test-cmd`, falling back to the project's documented test command when absent — never an improvised command; e.g. `.venv/bin/python -m pytest -q`) - green is necessary but NOT sufficient; (3) eyeball
      the real output the code produces - actual records/rows, the output the system
      generates, results from the relevant project CLI command or a `scripts/_*_oneoff.py`
      probe; (4) on any defect, diagnose and scope it, then re-delegate the fix to a
      FRESH apply-executor (deepseek via opencode run, one attempt; Sonnet subagent as
      fallback on operational-or-quality failure; never hand-fix beyond a trivial
      typo/one-line change; more than one line of implementation => re-delegate).
      Only after this behavioral review passes, do the spec/task mapping checks.
  archive:
    - >-
      Archive is the project-state reconciliation (handoff). After interactive gates
      (artifact/task checks, delta-spec sync decision), delegate full execution —
      directory move, optional delta-spec sync, and reconciliation of memory/STATUS.md /
      memory/decisions/INDEX.md / memory/questions/INDEX.md — to a
      deepseek/deepseek-v4-pro archive-executor (under Claude: via `opencode run`;
      under OpenCode: a subagent). The executor runs with fresh context seeded from
      the change dir. After the executor finishes, the primary reviews the
      reconciliation, fixes any gaps, then commits. The executor never commits.
      The full history lives in openspec/changes/archive/; memory/STATUS.md holds
      only the ≤3 most recent change sections.
  research:
    - >-
      (a) GitHub files — always fetch raw, never clone. For any GitHub repo or file,
      fetch via raw.githubusercontent.com directly or run
      `python scripts/fetch_clean.py <github-url>` (it rewrites GitHub URLs to raw
      automatically). Do NOT git clone whole repos or Read many repo files — pull only
      the specific README or source file you need.
    - >-
      (b) Full-page article content — use fetch_clean or targeted WebFetch. When you
      need the full cleaned text of a page, prefer: `python scripts/fetch_clean.py <url>`.
      Use the built-in WebFetch tool with a specific extraction prompt when you only need
      a targeted answer from the page (it summarizes server-side and is cheap for that
      use case). Avoid loading whole raw HTML pages into context.
    - >-
      (c) Be targeted — don't fetch what you won't cite. Only fetch a page if you will
      actually use and cite its content in the output. Checkpoint to the output file as
      you go (write partial findings early; don't hold everything in context until the end).
    - >-
      (d) Never call the built-in WebSearch tool from the main thread. Route ALL web
      research through subagents that use scripts/fetch_clean.py (discover via a fetched
      search URL, then fetch the chosen pages). This keeps the orchestrator context clean
      and lets research run in parallel and checkpoint to disk; the orchestrator applies
      its own judgment to subagent reports.
